<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c0e"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#16a34a"/>

  <!-- Icon halos -->
  <circle cx="600" cy="198" r="76" fill="#16a34a" fill-opacity="0.10"/>
  <circle cx="600" cy="198" r="56" fill="#16a34a" fill-opacity="0.18"/>

  <!-- Lightning bolt (centered at 600,198, scale 2.5 from 0 0 32 32) -->
  <!-- path: M19 3L9 17h6l-3 12 11-15h-6z, bounding center ~(16,16) -->
  <g transform="translate(560, 158) scale(2.5)">
    <path d="M19 3L9 17h6l-3 12 11-15h-6z" fill="#22c55e"/>
  </g>

  <!-- Title -->
  <text
    x="600" y="368"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="104"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-3"
  >EV of Nee?</text>

  <!-- Subtitle -->
  <text
    x="600" y="436"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="29"
    font-weight="400"
    fill="#a1a1aa"
    text-anchor="middle"
  >Bereken of een elektrische auto voor jou uitkomt</text>

  <!-- Green divider -->
  <rect x="548" y="472" width="104" height="3" rx="1.5" fill="#16a34a"/>

  <!-- Domain -->
  <text
    x="600" y="528"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="500"
    fill="#52525b"
    text-anchor="middle"
    letter-spacing="1.5"
  >evofnee.nl</text>
</svg>
